name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-github-safe-publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.12']
    defaults:
      run:
        working-directory: skills/github-safe-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests/ -v --tb=short --cov=tests --cov-report=term-missing --cov-fail-under=95

  test-project-walkthrough:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/project-walkthrough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest jsonschema pyyaml
      - run: python -m pytest tests/ -v --tb=short

  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check marketplace.json valid
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
      - name: Check skill self-containment
        run: python3 scripts/check_self_contained.py

  collection-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - name: Run collection-level tests
        run: python -m pytest tests/ -v --tb=short
      - name: Verify convert.sh --check
        run: bash scripts/convert.sh --check
